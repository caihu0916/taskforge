name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  backend:
    name: Backend (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12", "3.13"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Lint (ruff)
        run: ruff check src/ tests/
        continue-on-error: true  # Public repo has simplified code; lint warnings don't block

      - name: Format check (ruff)
        run: ruff format --check src/ tests/
        continue-on-error: true  # Public repo has simplified code; format warnings don't block

      - name: Verify core imports
        run: |
          python -c "
          from src.api.app import create_app
          from src.infra.config.settings import get_settings
          from src.infra.database.connection import get_connection
          print('Core imports OK')
          "
        continue-on-error: true  # Public repo has stub modules; import check is informational

  frontend:
    name: Frontend (Node)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: web

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: web/package.json

      - name: Install dependencies
        run: npm install

      - name: Type check (tsc)
        run: npx tsc --noEmit

      - name: Build (vite)
        run: npx vite build

  security:
    name: Secrets Scan
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: TruffleHog OSS
        uses: trufflesecurity/trufflehog@main
        with:
          path: .
          extra_args: --only-verified
